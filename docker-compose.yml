networks:
  default:
    name: shannon-net

services:
  temporal:
    image: temporalio/temporal:latest
    container_name: shannon-temporal
    command: ["server", "start-dev", "--db-filename", "/home/temporal/temporal.db", "--ip", "0.0.0.0"]
    ports:
      - "127.0.0.1:7233:7233"   # gRPC
      - "127.0.0.1:8233:8233"   # Web UI (built-in)
    volumes:
      - temporal-data:/home/temporal
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Optional: claude-code-router for multi-model support
  # Start with: ROUTER=true ./shannon start ...
  #
  # SUPPLY-CHAIN: Base image and npm package are pinned to exact versions.
  # The router receives both ANTHROPIC_API_KEY and OPENAI_API_KEY via env,
  # so any compromise of Docker Hub's node:20-slim tag or the
  # @musistudio/claude-code-router npm tag would leak credentials. Re-pin when
  # updating by running:
  #   docker buildx imagetools inspect node:20-slim       # image digest
  #   npm view @musistudio/claude-code-router version     # npm version
  # Keep apps/cli/infra/compose.yml in sync with this file.
  router:
    image: node:20-slim@sha256:f93745c153377ee2fbbdd6e24efcd03cd2e86d6ab1d8aa9916a3790c40313a55
    container_name: shannon-router
    profiles: ["router"]  # Only starts when explicitly requested
    command: >
      sh -c "apt-get update && apt-get install -y gettext-base &&
             npm install -g @musistudio/claude-code-router@2.0.0 &&
             mkdir -p /root/.claude-code-router &&
             envsubst < /config/router-config.json > /root/.claude-code-router/config.json &&
             ccr start"
    ports:
      - "127.0.0.1:3456:3456"
    volumes:
      - ./apps/cli/infra/router-config.json:/config/router-config.json:ro
    environment:
      - HOST=0.0.0.0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ROUTER_DEFAULT=${ROUTER_DEFAULT:-openai,gpt-4o}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3456/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  temporal-data:
