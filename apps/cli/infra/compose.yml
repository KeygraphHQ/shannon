networks:
  default:
    name: shannon-net

services:
  temporal:
    image: temporalio/temporal:latest
    container_name: shannon-temporal
    command: ["server", "start-dev", "--db-filename", "/home/temporal/temporal.db", "--ip", "0.0.0.0"]
    ports:
      - "127.0.0.1:7233:7233"
      - "127.0.0.1:8233:8233"
    volumes:
      - temporal-data:/home/temporal
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # LiteLLM proxy — see docker-compose.yml at the repo root for the local-mode
  # equivalent. Only started when the `deepseek` compose profile is enabled.
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: shannon-litellm
    profiles: ["deepseek"]
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
    ports:
      - "127.0.0.1:4000:4000"   # localhost-only — for debugging via curl
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - ./litellm-config.yaml:/etc/litellm/config.yaml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  temporal-data:
